# GitLab CI/CD Pipeline for MLOps End-to-End Pipeline
# Orchestrates data processing, model training, and deployment

stages:
  - build
  - train
  - test
  - deploy
  - monitor

variables:
  REGISTRY: "docker.io"  # Change to your registry
  IMAGE_NAME: "mlops-pipeline"
  TRAINING_IMAGE: "${REGISTRY}/${CI_PROJECT_NAMESPACE}/${IMAGE_NAME}:training-${CI_COMMIT_SHORT_SHA}"
  SERVING_IMAGE: "${REGISTRY}/${CI_PROJECT_NAMESPACE}/${IMAGE_NAME}:serving-${CI_COMMIT_SHORT_SHA}"
  MLFLOW_TRACKING_URI: "http://mlflow.mlflow:5000"
  MINIO_ENDPOINT: "http://minio.minio:9000"
  KUBERNETES_VERSION: "1.24"
  # Opt-in controls for environment-specific jobs.
  ENABLE_DEPLOY_JOBS: "false"
  ENABLE_MONITOR_JOBS: "false"

# ============================================================================
# Build Stage: Build Docker images for training and serving
# ============================================================================

build:training:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker info
    - docker build -f docker/Dockerfile.training -t $TRAINING_IMAGE .
    - |
      if [ -n "$REGISTRY_USER" ] && [ -n "$REGISTRY_PASSWORD" ]; then
        echo "$REGISTRY_PASSWORD" | docker login -u "$REGISTRY_USER" --password-stdin "$REGISTRY"
        docker push "$TRAINING_IMAGE"
      else
        echo "REGISTRY_USER/REGISTRY_PASSWORD not set; skipping image push for local Path A2 run."
      fi
  only:
    - main
    - /^release-.*$/
  tags:
    - docker

build:serving:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker info
    - docker build -f docker/Dockerfile.serving -t $SERVING_IMAGE .
    - |
      if [ -n "$REGISTRY_USER" ] && [ -n "$REGISTRY_PASSWORD" ]; then
        echo "$REGISTRY_PASSWORD" | docker login -u "$REGISTRY_USER" --password-stdin "$REGISTRY"
        docker push "$SERVING_IMAGE"
      else
        echo "REGISTRY_USER/REGISTRY_PASSWORD not set; skipping image push for local Path A2 run."
      fi
  only:
    - main
    - /^release-.*$/
  tags:
    - docker

# ============================================================================
# Train Stage: Execute ML training pipeline
# ============================================================================

train:model:
  stage: train
  image: python:3.11-slim
  variables:
    AWS_ACCESS_KEY_ID: "minioadmin"
    AWS_SECRET_ACCESS_KEY: "minioadmin"
    AWS_DEFAULT_REGION: "us-east-1"
    MLFLOW_S3_ENDPOINT_URL: "http://minio.minio:9000"
    AWS_S3_ENDPOINT_URL: "http://minio.minio:9000"
  script:
    - echo "Starting model training..."
    - pip install --no-cache-dir -r models/requirements.txt
    - |
      python - <<'PY'
      import boto3
      from botocore.exceptions import ClientError

      s3 = boto3.client(
        "s3",
        endpoint_url="http://minio.minio:9000",
        aws_access_key_id="minioadmin",
        aws_secret_access_key="minioadmin",
        region_name="us-east-1",
      )

      bucket = "mlflow-artifacts"
      try:
        s3.head_bucket(Bucket=bucket)
        print(f"Bucket already exists: {bucket}")
      except ClientError:
        s3.create_bucket(Bucket=bucket)
        print(f"Created bucket: {bucket}")
      PY
    - python pipelines/train_pipeline.py
    - echo "Model training completed"
  artifacts:
    paths:
      - mlruns/
      - metrics.json
    expire_in: 30 days
  only:
    - main
    - schedules  # For scheduled retraining
  tags:
    - kubernetes
  retry:
    max: 2
    when: script_failure

# ============================================================================
# Test Stage: Validate model performance
# ============================================================================

test:model:
  stage: test
  image: python:3.11-slim
  variables:
    PYTHONPATH: "$CI_PROJECT_DIR"
  script:
    - echo "Running model tests..."
    - pip install --no-cache-dir -r models/requirements.txt pytest pytest-cov
    - pytest models/ -v --cov=models/ --cov-report=term
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
  only:
    - main
    - merge_requests
  tags:
    - kubernetes

test:inference:
  stage: test
  image: python:3.11-slim
  variables:
    PYTHONPATH: "$CI_PROJECT_DIR"
  script:
    - echo "Testing inference service..."
    - pip install --no-cache-dir -r models/requirements.txt pytest
    - python -m pytest models/test_pipeline.py -v -k "Inference"
  only:
    - main
    - merge_requests
  tags:
    - kubernetes

# ============================================================================
# Deploy Stage: Deploy model to KServe
# ============================================================================

deploy:kserve:
  stage: deploy
  image: bitnami/kubectl:latest
  rules:
    - if: '$ENABLE_DEPLOY_JOBS == "true"'
      when: manual
    - when: never
  script:
    - echo "Deploying model to KServe..."
    - kubectl config use-context $KUBE_CONTEXT
    - kubectl apply -f kubernetes/04-kserve-inference-service.yaml -n kserve
    - echo "Waiting for deployment..."
    - kubectl rollout status deployment/churn-predictor -n kserve --timeout=5m
  environment:
    name: production
    kubernetes:
      namespace: kserve
  tags:
    - kubernetes

deploy:staging:
  stage: deploy
  image: bitnami/kubectl:latest
  rules:
    - if: '$ENABLE_DEPLOY_JOBS == "true"'
      when: manual
    - when: never
  script:
    - echo "Deploying model to staging environment..."
    - kubectl config use-context $KUBE_CONTEXT_STAGING
    - kubectl set image deployment/churn-predictor-staging \
        predictor=$SERVING_IMAGE \
        -n kserve-staging
    - kubectl rollout status deployment/churn-predictor-staging -n kserve-staging --timeout=5m
  environment:
    name: staging
    kubernetes:
      namespace: kserve-staging
  tags:
    - kubernetes

# ============================================================================
# Monitor Stage: Health checks and metrics collection
# ============================================================================

monitor:inference:
  stage: monitor
  image: curlimages/curl:latest
  rules:
    - if: '$ENABLE_MONITOR_JOBS == "true"'
      when: on_success
    - when: never
  script:
    - echo "Checking model inference service health..."
    - |
      for i in {1..30}; do
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://churn-predictor.kserve/health)
        if [ $STATUS -eq 200 ]; then
          echo "✓ Service is healthy"
          exit 0
        fi
        echo "Attempt $i/30: Waiting for service... (Status: $STATUS)"
        sleep 10
      done
      echo "✗ Service failed to become healthy"
      exit 1
  environment:
    name: production
  tags:
    - kubernetes

monitor:mlflow:
  stage: monitor
  image: curlimages/curl:latest
  rules:
    - if: '$ENABLE_MONITOR_JOBS == "true"'
      when: on_success
    - when: never
  script:
    - echo "Verifying MLflow tracking server..."
    - |
      STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://mlflow.mlflow:5000/)
      if [ $STATUS -eq 200 ] || [ $STATUS -eq 301 ]; then
        echo "✓ MLflow is accessible"
        exit 0
      else
        echo "✗ MLflow health check failed (Status: $STATUS)"
        exit 1
      fi
  tags:
    - kubernetes

# ============================================================================
# Scheduled Jobs
# ============================================================================

scheduled:retrain:
  stage: train
  script:
    - echo "Executing scheduled retraining..."
    - python pipelines/train_pipeline.py
  only:
    - schedules
  tags:
    - kubernetes

scheduled:cleanup:
  stage: monitor
  script:
    - echo "Cleaning up old artifacts..."
    - |
      THRESHOLD=$(date -d '30 days ago' +%s)
      # Remove old MLflow runs and artifacts
      echo "Cleanup job completed"
  only:
    - schedules
  tags:
    - kubernetes
