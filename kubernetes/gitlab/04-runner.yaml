apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-runner-scripts
  namespace: gitlab
data:
  register-and-run.sh: |
    #!/bin/sh
    set -e

    if [ -z "${CI_SERVER_URL}" ] || [ -z "${RUNNER_TOKEN}" ]; then
      echo "CI_SERVER_URL and RUNNER_TOKEN must be set"
      exit 1
    fi

    # Create config.toml with modern token-based authentication
    if [ ! -f /etc/gitlab-runner/config.toml ]; then
      mkdir -p /etc/gitlab-runner
      printf '%s\n' \
        'concurrent = 10' \
        'log_level = "info"' \
        '' \
        '[[runners]]' \
        "  name = \"k8s-shared-runner\"" \
        "  url = \"${CI_SERVER_URL}\"" \
        "  token = \"${RUNNER_TOKEN}\"" \
        '  executor = "kubernetes"' \
        '  description = "Kubernetes executor runner"' \
        '  tags = ["kubernetes", "docker"]' \
        '  run_untagged = true' \
        '  locked = false' \
        '' \
        '  [runners.kubernetes]' \
        "    namespace = \"${KUBERNETES_NAMESPACE}\"" \
        '    image = "alpine:3.20"' \
        '    helper_image = "registry.gitlab.com/gitlab-org/gitlab-runner/gitlab-runner-helper:arm64-v19.2.0"' \
        '    service_account = "gitlab-runner"' \
        '    privileged = true' \
        > /etc/gitlab-runner/config.toml
    fi

    exec gitlab-runner run --user=gitlab-runner --working-directory=/home/gitlab-runner
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab-runner
  namespace: gitlab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab-runner
  template:
    metadata:
      labels:
        app: gitlab-runner
    spec:
      serviceAccountName: gitlab-runner
      containers:
      - name: gitlab-runner
        image: gitlab/gitlab-runner:v19.2.0
        imagePullPolicy: IfNotPresent
        env:
        - name: CI_SERVER_URL
          valueFrom:
            secretKeyRef:
              name: gitlab-runner-auth
              key: CI_SERVER_URL
        - name: RUNNER_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitlab-runner-auth
              key: RUNNER_TOKEN
        - name: KUBERNETES_NAMESPACE
          value: gitlab
        command: ["/bin/sh", "/config/register-and-run.sh"]
        volumeMounts:
        - name: runner-config
          mountPath: /etc/gitlab-runner
        - name: runner-scripts
          mountPath: /config
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      volumes:
      - name: runner-config
        emptyDir: {}
      - name: runner-scripts
        configMap:
          name: gitlab-runner-scripts
          defaultMode: 0755
