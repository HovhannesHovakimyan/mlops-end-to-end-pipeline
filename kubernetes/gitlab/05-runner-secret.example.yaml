apiVersion: v1
kind: Secret
metadata:
  name: gitlab-runner-auth
  namespace: gitlab
type: Opaque
stringData:
  # Use the in-cluster service URL when GitLab is deployed by 02-gitlab.yaml
  CI_SERVER_URL: http://gitlab.gitlab.svc.cluster.local
  # Replace with the runner authentication token from GitLab (modern token-based auth)
  # Create a runner in Admin → CI/CD → Runners, copy its authentication token here
  RUNNER_TOKEN: REPLACE_WITH_GITLAB_RUNNER_AUTHENTICATION_TOKEN
