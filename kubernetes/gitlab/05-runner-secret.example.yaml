apiVersion: v1
kind: Secret
metadata:
  name: gitlab-runner-auth
  namespace: gitlab
type: Opaque
stringData:
  # Use the in-cluster service URL when GitLab is deployed by 02-gitlab.yaml
  CI_SERVER_URL: http://gitlab.gitlab.svc.cluster.local
  # Replace with the registration token from your GitLab project/group
  RUNNER_REGISTRATION_TOKEN: REPLACE_WITH_GITLAB_RUNNER_REGISTRATION_TOKEN
